name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: guilvestor-web/package-lock.json

      - name: Install dependencies
        run: |
          cd guilvestor-web
          npm ci

      - name: Run unit tests
        run: |
          cd guilvestor-web
          npm test

      - name: Run E2E tests
        run: |
          cd guilvestor-web
          npm run test:e2e

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: guilvestor-api/package-lock.json

      - name: Install dependencies
        run: |
          cd guilvestor-api
          npm ci

      - name: Run tests
        run: |
          cd guilvestor-api
          npm test
