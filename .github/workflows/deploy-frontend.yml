name: Deploy Frontend

on:
  push:
    branches: [main, frontend]
    paths:
      - 'guilvestor-web/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: guilvestor-web/package-lock.json

      - name: Install dependencies
        run: |
          cd guilvestor-web
          npm ci

      - name: Type check
        run: |
          cd guilvestor-web
          npm run typecheck

      - name: Lint
        run: |
          cd guilvestor-web
          npm run lint

      - name: Build
        run: |
          cd guilvestor-web
          npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy to S3
        run: |
          aws s3 sync guilvestor-web/dist s3://${{ secrets.S3_BUCKET_NAME }} --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-1
